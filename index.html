<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apresentação: Budismo</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        montserrat: ['Montserrat', 'sans-serif'],
                        inter: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            orange: '#f97316',
                            amber: '#f59e0b',
                            dark: '#050505',
                            darker: '#000000',
                            glass: 'rgba(255, 255, 255, 0.05)'

    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* Scrollbar customizada */
        .custom-scrollbar::-webkit-scrollbar { height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(249,115,22,0.5); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(249,115,22,1); }

        /* Animações da Apresentação */
        .slide-enter {
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0; transform: translateY(40px);
        }
        .img-enter {
            animation: fadeLeft 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0; transform: translateX(60px);
        }
        .float-anim {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeLeft { to { opacity: 1; transform: translateX(0); } }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        /* Efeito Arco de Luz */
        .glow-arc {
            position: absolute; right: -10vw; top: 50%; transform: translateY(-50%);
            width: 40vw; height: 90vh;
            border-left: 1px solid rgba(249, 115, 22, 0.2);
            border-radius: 50%; pointer-events: none; z-index: 0;
            box-shadow: -20px 0 50px rgba(249,115,22,0.05);
        }

        /* Estilo Glassmorphism (Vidro) */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(249, 115, 22, 0.5);
        }

        /* --- ANIMAÇÕES CONTROLADAS DA INTRO (ESTÚDIO) --- */
        .studio-letter {
            display: inline-block;
            opacity: 0;
            transform-origin: bottom center;
        }
        .studio-letter.drop-anim {
            animation: dropBounce 1.2s cubic-bezier(0.28, 0.84, 0.42, 1) forwards;
        }
        @keyframes dropBounce {
            0% { transform: translateY(-300px) scaleY(1.5) rotate(15deg); opacity: 0; filter: blur(5px); }
            50% { transform: translateY(10px) scaleY(0.8) rotate(-5deg); opacity: 1; filter: blur(0px); }
            70% { transform: translateY(-5px) scaleY(1.05) rotate(2deg); }
            100% { transform: translateY(0) scaleY(1) rotate(0deg); opacity: 1; }
        }
        
        .studio-fade { opacity: 0; }
        .studio-fade.fade-anim { animation: fadeUp 1s ease forwards; }

        /* OS Mode */
        .os-bg { background: url('https://images.unsplash.com/photo-1506744012022-2b62d3a04297?auto=format&fit=crop&q=80') no-repeat center center/cover; }
        .os-window { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); transition: all 0.3s ease; }
        .image-mask {
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 75%, rgba(0,0,0,0) 100%);
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 75%, rgba(0,0,0,0) 100%);
        }

        /* Barra Inferior Animada */
        #bottom-nav-bar { transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        #bottom-hover-trigger { position: absolute; bottom: 0; left: 0; width: 100%; height: 60px; z-index: 25; }
    </style>
</head>

            {

                stats: [{ label: "Paz Interior", value: 95 }, { label: "Compaixão", value: 90 }, { label: "Atenção", value: 98 }],
                image: "https://images.unsplash.com/photo-1584286595398-a59f21d313f5?auto=format&fit=crop&q=80",
                navTitle: "INTRO", navSub: "O QUE É"
            },

                stats: [{ label: "Renúncia", value: 100 }, { label: "Resiliência", value: 95 }, { label: "Iluminação", value: 100 }],

            {

                stats: [{ label: "Foco", value: 98 }, { label: "Respiração", value: 95 }, { label: "Calma", value: 90 }],
                image: "https://images.unsplash.com/photo-1545389336-eaeecece96ef?auto=format&fit=crop&q=80",

            {

        // ==========================================
        // MOTOR DE PARTÍCULAS
        // ==========================================
        function initParticles(canvasId) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particlesArray = [];

            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 2.5 + 0.5;
                    this.speedX = Math.random() * 1 - 0.5;
                    this.speedY = Math.random() * -1.5 - 0.5;
                    this.color = `rgba(249, 115, 22, ${Math.random() * 0.5 + 0.1})`;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.y < 0) {
                        this.y = canvas.height;
                        this.x = Math.random() * canvas.width;
                    }
                }
                draw() {
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            for (let i = 0; i < 80; i++) particlesArray.push(new Particle());

            function animateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < particlesArray.length; i++) {
                    particlesArray[i].update();
                    particlesArray[i].draw();
                }
                animationFrameId = requestAnimationFrame(animateParticles);
            }
            animateParticles();

            window.addEventListener('resize', () => {
                if(canvas) { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            });
        }

        // ==========================================
        // TEXTO ANIMADO
        // ==========================================
        function createStudioText(text) {
            return text.split('').map((char) => {
                if (char === ' ') return '&nbsp;';
                return `<span class="studio-letter">${char}</span>`;
            }).join('');
        }

        // ==========================================
        // RENDERIZADORES HTML
        // ==========================================

        function render() {
            if (currentMode === 'start') {
                appDiv.innerHTML = renderStartScreen();
            } else if (currentMode === 'os') {
                appDiv.innerHTML = renderOSDesktop();
            } else if (currentMode === 'intro' || currentMode === 'os-intro') {
                const container = currentMode === 'intro' ? appDiv : document.getElementById('browser-content');
                container.innerHTML = renderStudioIntro();
            } else if (currentMode === 'normal' || currentMode === 'os-presentation') {
                const container = currentMode === 'normal' ? appDiv : document.getElementById('browser-content');
                container.innerHTML = renderPresentationUI();
                attachPresentationEvents();
                triggerSlideAnimations();
                initParticles('particles-canvas');
                if (activeSlideIndex === 6) initChart();
            }
        }

        // --- MODO APRESENTAÇÃO ---
        function renderPresentationUI() {
            const slide = slidesData[activeSlideIndex];
            
            let statsHTML = '';
            slide.stats.forEach(stat => {
                statsHTML += `

                        <div class="flex-1 flex flex-col justify-center md:pr-12 relative z-20">
                            <div id="anim-text" class="slide-enter">
                                <h1 class="font-montserrat font-black text-5xl md:text-6xl lg:text-7xl leading-[0.9] mb-4 tracking-tighter drop-shadow-lg">
                                    ${slide.title.replace('.', '<span class="text-brand-orange drop-shadow-[0_0_10px_rgba(249,115,22,0.8)]">.</span>')}
                                </h1>
                                <h2 class="text-brand-orange font-bold tracking-[0.2em] uppercase text-xs md:text-sm mb-6 bg-brand-orange/10 inline-block px-3 py-1 rounded">
                                    ${slide.subtitle}
                                </h2>
                                <p class="text-gray-300 text-sm md:text-base leading-relaxed max-w-lg mb-8 font-light drop-shadow-md">
                                    ${slide.description}
                                </p>
                                <div class="w-full max-w-sm h-px bg-gradient-to-r from-brand-orange/50 to-transparent mb-6"></div>
                                <div class="stats-container">${statsHTML}</div>
                            </div>
                        </div>

                        <div class="flex-1 relative hidden md:flex items-center justify-center">
                            <div class="glow-arc"></div>
                            <div id="anim-img" class="img-enter float-anim w-full h-[65vh] relative z-10 flex items-center justify-center">
                                ${slide.id === 7 
                                    ? `<div class="w-full max-w-md glass-card p-6 rounded-2xl border border-white/10 shadow-2xl"><canvas id="buddhismChart"></canvas></div>` 
                                    : `<img src="${slide.image}" class="h-full w-auto object-cover object-center image-mask drop-shadow-[0_0_30px_rgba(249,115,22,0.15)] rounded-2xl">`
                                }
                            </div>
                        </div>
                    </main>

                    <div id="bottom-hover-trigger" onmouseenter="showBottomBar()" onmouseleave="hideBottomBarAfterDelay()"></div>
                    <div id="bottom-nav-bar" class="absolute bottom-6 md:bottom-8 left-0 w-full px-6 md:px-12 z-30 translate-y-[150%]">
                        <div class="flex gap-4 md:gap-6 overflow-x-auto pb-4 custom-scrollbar items-end" onmouseenter="clearBottomBarTimeout()" onmouseleave="hideBottomBarAfterDelay()">
                            ${cardsHTML}
                        </div>
                    </div>
                </div>
            `;
        }

        // ==========================================
        // LÓGICA DE INTRODUÇÃO SEGURA E SEM TRAVAMENTOS
        // ==========================================

        function setMode(mode) {
            currentMode = mode;
            if (mode === 'normal' || mode === 'os') activeSlideIndex = 0;
            render();
            if (mode === 'os') startClock();
        }

        function playIntro(targetMode) {
            currentMode = targetMode === 'os-presentation' ? 'os-intro' : 'intro';
            render();

            let animationStarted = false;

            // Função que coordena a animação da intro
            const triggerIntroAnimations = () => {
                if (animationStarted) return;
                animationStarted = true;

                const wrapper = document.getElementById('intro-content-wrapper');
                if (wrapper) wrapper.style.opacity = '1';

                const fadeEl = document.querySelector('.studio-fade');
                if (fadeEl) fadeEl.classList.add('fade-anim');

                // Anima as letras em sequência simulando batidas de música
                const letters = document.querySelectorAll('.studio-letter');
                letters.forEach((letter, index) => {
                    setTimeout(() => {
                        letter.classList.add('drop-anim');
                    }, 800 + (index * 40)); 
                });

                // Avança para o modo final após 5.5s (independente do YouTube)
                setTimeout(() => {
                    if (introPlayer && typeof introPlayer.pauseVideo === 'function') {
                        introPlayer.pauseVideo();
                    }
                    setMode(targetMode);
                }, 5500);
            };

            // Tenta tocar o vídeo do YouTube da intro
            if (ytApiReady && introPlayer && typeof introPlayer.playVideo === 'function') {
                introPlayer.seekTo(0);
                introPlayer.playVideo();
                // Aciona animações sincronizadas com a música
                setTimeout(triggerIntroAnimations, 500);
            } else {
                // FALLBACK: Se o YT falhar/bloquear, roda a animação perfeitamente mesmo assim
                setTimeout(triggerIntroAnimations, 100);
            }
        }

        function changeSlide(index) {
            if (activeSlideIndex === index) return;
            activeSlideIndex = index;
            render();
            showBottomBarTemporarily();
        }

        function triggerSlideAnimations() {
            const textAnim = document.getElementById('anim-text');
            const imgAnim = document.getElementById('anim-img');
            if (textAnim) { textAnim.classList.remove('slide-enter'); void textAnim.offsetWidth; textAnim.classList.add('slide-enter'); }
            if (imgAnim) { imgAnim.classList.remove('img-enter'); void imgAnim.offsetWidth; imgAnim.classList.add('img-enter'); }
        }

        // --- Controles da Barra ---
        function showBottomBar() {
            const bar = document.getElementById('bottom-nav-bar');
            if (bar) bar.classList.remove('translate-y-[150%]');
        }
        function hideBottomBar() {
            const bar = document.getElementById('bottom-nav-bar');
            if (bar) bar.classList.add('translate-y-[150%]');
        }
        function clearBottomBarTimeout() {
            if (bottomBarTimeout) clearTimeout(bottomBarTimeout);
        }
        function hideBottomBarAfterDelay() {
            clearBottomBarTimeout();
            bottomBarTimeout = setTimeout(hideBottomBar, 2500);
        }
        function showBottomBarTemporarily() {
            showBottomBar();
            hideBottomBarAfterDelay();
        }

        // --- Eventos de Teclado ---
        function attachPresentationEvents() {
            document.onkeydown = function(e) {
                if (!currentMode.includes('normal') && !currentMode.includes('os-presentation')) return;
                const key = e.key.toLowerCase();
                if (key === 'arrowright' || key === 'd' || key === 'w' || key === 'arrowup') {
                    changeSlide((activeSlideIndex + 1) % slidesData.length);
                } else if (key === 'arrowleft' || key === 'a' || key === 's' || key === 'arrowdown') {
                    changeSlide((activeSlideIndex - 1 + slidesData.length) % slidesData.length);
                }
            };
        }

        // --- OS MODO LOGIC ---
        let clockInterval;
        function startClock() {
            clearInterval(clockInterval);
            const updateTime = () => {
                const el = document.getElementById('os-clock');
                if(el) el.innerText = new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
            };
            updateTime();
            clockInterval = setInterval(updateTime, 60000);
        }

        function openOSBrowser() {
            const win = document.getElementById('browser-window');
            if (win) win.classList.remove('hidden');
        }

        function closeOSBrowser() {
            const win = document.getElementById('browser-window');
            if (win) {
                win.classList.add('hidden');
                isSearching = false;
                setTimeout(() => { if(currentMode === 'os-presentation' || currentMode === 'os-intro') setMode('os'); }, 300);
            }
        }

        let isSearching = false;
        function startGoogleSearch() {
            if (isSearching) return; 
            const input = document.getElementById('search-input');
            if (!input) return;
            isSearching = true;
            const textToType = "Apresentação sobre Budismo";
            let i = 0; input.value = "";
            const typeInterval = setInterval(() => {
                input.value += textToType.charAt(i);
                i++;
                if (i >= textToType.length) {
                    clearInterval(typeInterval);
                    setTimeout(() => {
                        const urlBar = document.getElementById('url-bar');
                        if(urlBar) urlBar.innerText = "dharma.app/apresentacao";
                        playIntro('os-presentation');
                    }, 600);
                }
            }, 50);
        }

        // --- Chart.js ---
        function initChart() {
            const ctx = document.getElementById('buddhismChart');
            if (!ctx) return;
            if (chartInstance) chartInstance.destroy();

            Chart.defaults.color = '#fff';
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Ásia-Pacífico', 'Américas', 'Europa'],
                    datasets: [{
                        data: [85, 10, 5],
                        backgroundColor: ['#f97316', '#fb923c', '#fdba74'],
                        borderWidth: 0, hoverOffset: 15
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom', labels: { font: { family: 'Inter', size: 13 } } },
                        title: { display: true, text: 'Distribuição Demográfica', font: { family: 'Montserrat', size: 16 } }
                    },
                    cutout: '75%'
                }
            });
        }

        window.onload = () => setMode('start');

    </script>
</body>
</html>
