<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apresentação: Budismo</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        montserrat: ['Montserrat', 'sans-serif'],
                        inter: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            orange: '#f97316',
                            amber: '#f59e0b',
                            dark: '#050505',
                            darker: '#000000',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        /* --- TELA DE CARREGAMENTO --- */
        #loading-screen {
            position: fixed; inset: 0; z-index: 9999;
            background-color: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1s ease;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid rgba(249, 115, 22, 0.2);
            border-top-color: #f97316;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- VÍDEOS DE FUNDO DO YOUTUBE --- */
        .video-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            transition: opacity 1.5s ease-in-out;
            pointer-events: none;
            overflow: hidden;
        }
        
        .yt-bg-iframe {
            position: absolute;
            top: 50%; left: 50%;
            width: 100vw; height: 100vh;
            transform: translate(-50%, -50%) scale(1.8);
            pointer-events: none;
            border: none;
        }

        /* Scrollbar customizada */
        .custom-scrollbar::-webkit-scrollbar { height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(249,115,22,0.5); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(249,115,22,1); }

        /* Esconder scrollbar para barra de navegação mais limpa */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        /* Animações da Apresentação */
        .slide-enter { animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(40px); }
        .img-enter { animation: fadeLeft 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateX(60px); }
        .float-anim { animation: float 6s ease-in-out infinite; }

        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeLeft { to { opacity: 1; transform: translateX(0); } }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-15px); } 100% { transform: translateY(0px); } }

        /* Estilo Glassmorphism (Vidro Fosco) */
        .glass-card {
            background: rgba(10, 10, 10, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .glass-card:hover { background: rgba(20, 20, 20, 0.7); border-color: rgba(249, 115, 22, 0.5); }
        
        /* Estilo Glass mais limpo para o OS */
        .os-glass {
            background: rgba(20, 20, 30, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        /* --- ANIMAÇÕES CONTROLADAS DA INTRO (ESTÚDIO) --- */
        .studio-letter { display: inline-block; opacity: 0; transform-origin: bottom center; }
        .studio-letter.drop-anim { animation: dropBounce 1.2s cubic-bezier(0.28, 0.84, 0.42, 1) forwards; }
        @keyframes dropBounce {
            0% { transform: translateY(-300px) scaleY(1.5) rotate(15deg); opacity: 0; filter: blur(5px); }
            50% { transform: translateY(10px) scaleY(0.8) rotate(-5deg); opacity: 1; filter: blur(0px); }
            70% { transform: translateY(-5px) scaleY(1.05) rotate(2deg); }
            100% { transform: translateY(0) scaleY(1) rotate(0deg); opacity: 1; text-shadow: 0 0 20px rgba(249,115,22,0.8); }
        }
        
        .studio-fade { opacity: 0; }
        .studio-fade.fade-anim { animation: fadeUp 1s ease forwards; }

        /* Barra Inferior Animada */
        #bottom-nav-bar { transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        #bottom-hover-trigger { position: absolute; bottom: 0; left: 0; width: 100%; height: 60px; z-index: 25; }
        
        /* Microfone a ouvir */
        .listening {
            animation: pulse-red 1.5s infinite;
            color: #ef4444 !important;
        }
        @keyframes pulse-red {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- TELA DE CARREGAMENTO INICIAL -->
    <div id="loading-screen">
        <div class="spinner mb-6"></div>
        <h2 class="font-montserrat font-bold text-xl tracking-widest animate-pulse">A INICIALIZAR EXPERIÊNCIA...</h2>
        <p class="text-gray-500 text-sm mt-2">A sincronizar áudio e vídeo de alta qualidade.</p>
    </div>

    <!-- CAMADAS DE VÍDEO E ÁUDIO DE FUNDO -->
    
    <!-- Camada 1: Vídeo das Opções (Sempre Mudo) -->
    <div id="video-layer-1" class="video-layer opacity-100">
        <div id="bg-player-div"></div>
        <div class="absolute inset-0 bg-black/50"></div> <!-- Escurece para leitura -->
    </div>

    <!-- Camada 2: Vídeo dos Slides (Sempre Mudo) -->
    <div id="video-layer-2" class="video-layer opacity-0">
        <div id="slide-video-div"></div>
        <div id="video-2-overlay" class="absolute inset-0 bg-black/40 transition-colors duration-1000"></div> 
    </div>

    <!-- Camadas Ocultas: Áudio -->
    <div id="slide-audio-div" class="hidden"></div>
    <div id="cr7-audio-div" class="hidden"></div> <!-- Reprodutor do Easter Egg -->

    <!-- APLICAÇÃO PRINCIPAL (UI SOBREPOSTA AOS VÍDEOS) -->
    <div id="app" class="w-full h-screen w-screen relative z-10 hidden"></div>

    <script>
        // ==========================================
        // CONFIGURAÇÃO DO YOUTUBE API E CARREGAMENTO
        // ==========================================
        let bgPlayer, slideVideoPlayer, slideAudioPlayer, cr7AudioPlayer;
        let playersReadyCount = 0;
        const TOTAL_PLAYERS = 4; // Agora são 4 players
        let isMusicPlaying = false;
        let forceStartTimeout;
        
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            // Player 1: Fundo de Opções (Short, Mudo)
            bgPlayer = new YT.Player('bg-player-div', {
                videoId: 's7i98_DeB04',
                playerVars: { 'autoplay': 1, 'controls': 0, 'loop': 1, 'playlist': 's7i98_DeB04', 'mute': 1, 'disablekb': 1, 'showinfo': 0, 'rel': 0 },
                events: { 'onReady': onPlayerReady }
            });

            // Player 2: Vídeo de Fundo dos Slides (Novo Vídeo, Mudo)
            slideVideoPlayer = new YT.Player('slide-video-div', {
                videoId: 'nVKK-WVW2uw',
                playerVars: { 'autoplay': 0, 'controls': 0, 'disablekb': 1, 'showinfo': 0, 'rel': 0, 'loop': 1, 'playlist': 'nVKK-WVW2uw', 'mute': 1 },
                events: { 'onReady': onPlayerReady }
            });

            // Player 3: Música dos Slides (Nova Música, Com Som)
            slideAudioPlayer = new YT.Player('slide-audio-div', {
                videoId: 'qgTEiSmve1Q',
                playerVars: { 'autoplay': 0, 'controls': 0, 'disablekb': 1, 'showinfo': 0, 'rel': 0, 'loop': 1, 'playlist': 'qgTEiSmve1Q' },
                events: { 'onReady': onPlayerReady }
            });
            
            // Player 4: Easter Egg CR7
            cr7AudioPlayer = new YT.Player('cr7-audio-div', {
                videoId: 'MfmcpDbXp9w',
                playerVars: { 'autoplay': 0, 'controls': 0, 'disablekb': 1, 'showinfo': 0, 'rel': 0 },
                events: { 'onReady': onPlayerReady }
            });

            // FALLBACK ANTI-TRAVAMENTO
            forceStartTimeout = setTimeout(() => {
                if(playersReadyCount < TOTAL_PLAYERS) forceStartApp();
            }, 8000);
        }

        function onPlayerReady(event) {
            if (event.target !== slideAudioPlayer && event.target !== cr7AudioPlayer) {
                event.target.getIframe().classList.add('yt-bg-iframe');
            }
            
            playersReadyCount++;
            if (playersReadyCount === TOTAL_PLAYERS) {
                clearTimeout(forceStartTimeout);
                bgPlayer.playVideo();
                forceStartApp();
            }
        }

        function forceStartApp() {
            const loadingScreen = document.getElementById('loading-screen');
            loadingScreen.style.opacity = '0';
            setTimeout(() => {
                loadingScreen.style.display = 'none';
                document.getElementById('app').classList.remove('hidden');
                setMode('start');
            }, 800);
        }

        // ==========================================
        // DADOS DA APRESENTAÇÃO
        // ==========================================
        const emails = ["miguel-rmontana@estudante.rs.gov.br", "gabriel-efdslopes@estudante.rs.gov.br"];

        const slidesData = [
            { id: 1, title: "O BUDISMO.", subtitle: "O CAMINHO DO MEIO", description: "O Budismo é uma filosofia e religião não-teísta que surgiu na Índia antiga. Baseia-se nos ensinamentos de Siddhartha Gautama, o Buda.", stats: [{ label: "Paz Interior", value: 95 }, { label: "Compaixão", value: 90 }, { label: "Atenção", value: 98 }], image: "https://images.unsplash.com/photo-1584286595398-a59f21d313f5?auto=format&fit=crop&q=80", navTitle: "INTRO", navSub: "O QUE É" },
            { id: 2, title: "SIDDHARTHA.", subtitle: "A HISTÓRIA DO PRÍNCIPE", description: "Siddhartha Gautama era um príncipe que vivia protegido. Ao sair do palácio, deparou-se com as 'Quatro Visões' e renunciou à riqueza para procurar a iluminação.", stats: [{ label: "Renúncia", value: 100 }, { label: "Resiliência", value: 95 }, { label: "Iluminação", value: 100 }], image: "https://images.unsplash.com/photo-1599009434802-ca1dd09895e7?auto=format&fit=crop&q=80", navTitle: "A ORIGEM", navSub: "O BUDA" },
            { id: 3, title: "AS 4 VERDADES.", subtitle: "O FUNDAMENTO", description: "1) A vida inclui sofrimento. 2) A causa é o apego. 3) Existe um fim para o sofrimento. 4) O caminho é o Nobre Caminho Óctuplo.", stats: [{ label: "Aceitação", value: 92 }, { label: "Lógica", value: 88 }, { label: "Ética", value: 96 }], image: "https://images.unsplash.com/photo-1517584318721-e0e643c16266?auto=format&fit=crop&q=80", navTitle: "VERDADES", navSub: "DOUTRINA" },
            { id: 4, title: "MEDITAÇÃO.", subtitle: "A PRÁTICA DO DESPERTAR", description: "Ferramenta central para cultivar atenção. O objetivo não é esvaziar a mente, mas observar os pensamentos sem apego, ganhando clareza.", stats: [{ label: "Foco", value: 98 }, { label: "Respiração", value: 95 }, { label: "Calma", value: 90 }], image: "https://images.unsplash.com/photo-1545389336-eaeecece96ef?auto=format&fit=crop&q=80", navTitle: "PRÁTICA", navSub: "MEDITAÇÃO" },
            { id: 5, title: "CIDADES.", subtitle: "GEOGRAFIA SAGRADA", description: "As principais cidades de peregrinação: Lumbini (nascimento), Bodh Gaya (iluminação), Sarnath (primeiro sermão) e Kushinagar.", stats: [{ label: "Bodh Gaya", value: 100 }, { label: "Lumbini", value: 90 }, { label: "Sarnath", value: 85 }], image: "https://images.unsplash.com/photo-1605647540924-852290f6b0d5?auto=format&fit=crop&q=80", navTitle: "GEOGRAFIA", navSub: "LOCAIS" },
            { id: 6, title: "ESCOLAS.", subtitle: "VERTENTES E EXPANSÃO", description: "O Budismo dividiu-se em veículos: Theravada (Anciãos, sudeste asiático), Mahayana (Grande Veículo, Ásia Oriental) e Vajrayana (Tibetano).", stats: [{ label: "Theravada", value: 80 }, { label: "Mahayana", value: 95 }, { label: "Vajrayana", value: 70 }], image: "https://images.unsplash.com/photo-1551445496-613d78bdcb82?auto=format&fit=crop&q=80", navTitle: "VERTENTES", navSub: "ESCOLAS" },
            { id: 7, title: "DEMOGRAFIA.", subtitle: "NO MUNDO", description: "Quarta maior religião do mundo (+500 milhões de adeptos). A grande maioria vive na Ásia-Pacífico. No Ocidente, cresce através da meditação secular.", stats: [{ label: "Ásia", value: 98 }, { label: "Américas", value: 10 }, { label: "Europa", value: 5 }], image: "none", navTitle: "GRÁFICOS", navSub: "ESTATÍSTICAS" }
        ];

        let currentMode = 'loading'; 
        let activeSlideIndex = 0;
        let chartInstance = null;
        let bottomBarTimeout = null;

        const appDiv = document.getElementById('app');

        // ==========================================
        // MOTOR DE PARTÍCULAS INTERATIVO (REAGE AO MOUSE)
        // ==========================================
        let particlesArray = [];
        let animationFrameId;
        let mouse = { x: null, y: null, radius: 100 };

        window.addEventListener('mousemove', function(event) {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        function initParticles(canvasId) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particlesArray = [];

            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 2 + 0.5;
                    this.baseX = this.x;
                    this.baseY = this.y;
                    this.density = (Math.random() * 30) + 1;
                    this.color = `rgba(249, 115, 22, ${Math.random() * 0.5 + 0.3})`;
                }
                update() {
                    // Flutuação normal lenta
                    this.y -= 0.5;
                    if (this.y < 0) {
                        this.y = canvas.height;
                        this.x = Math.random() * canvas.width;
                        this.baseX = this.x;
                    }

                    // Reação ao Mouse
                    if(mouse.x != null && mouse.y != null) {
                        let dx = mouse.x - this.x;
                        let dy = mouse.y - this.y;
                        let distance = Math.sqrt(dx * dx + dy * dy);
                        let forceDirectionX = dx / distance;
                        let forceDirectionY = dy / distance;
                        let maxDistance = mouse.radius;
                        let force = (maxDistance - distance) / maxDistance;
                        let directionX = forceDirectionX * force * this.density;
                        let directionY = forceDirectionY * force * this.density;

                        if (distance < mouse.radius) {
                            this.x -= directionX;
                            this.y -= directionY;
                        } else {
                            // Retorna à posição original horizontalmente
                            if (this.x !== this.baseX) {
                                let dx = this.x - this.baseX;
                                this.x -= dx / 20;
                            }
                        }
                    }
                }
                draw() {
                    ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
                }
            }
            for (let i = 0; i < 150; i++) particlesArray.push(new Particle());

            function animateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < particlesArray.length; i++) { particlesArray[i].update(); particlesArray[i].draw(); }
                animationFrameId = requestAnimationFrame(animateParticles);
            }
            if(animationFrameId) cancelAnimationFrame(animationFrameId);
            animateParticles();
            
            window.addEventListener('resize', () => {
                if(canvas) { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            });
        }

        // ==========================================
        // UTILITÁRIOS
        // ==========================================
        function createStudioText(text) {
            return text.split('').map((char) => {
                if (char === ' ') return '&nbsp;';
                return `<span class="studio-letter">${char}</span>`;
            }).join('');
        }

        // ==========================================
        // SISTEMA DE VOZ (EASTER EGG)
        // ==========================================
        let recognition;
        let isListening = false;
        let cr7Unlocked = false; // Flag para destrancar o áudio do YouTube
        
        function initVoiceSystem() {
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.lang = 'pt-PT';
                recognition.continuous = false;
                recognition.interimResults = false;

                recognition.onresult = function(event) {
                    const transcript = event.results[0][0].transcript.toLowerCase();
                    console.log("Comando de voz ouvido:", transcript);
                    
                    if (transcript.includes('cr7') || transcript.includes('r7') || transcript.includes('ronaldo') || transcript.includes('cristiano') || transcript.includes('robozão')) {
                        tocarEasterEggCR7();
                    }
                };

                recognition.onend = function() {
                    isListening = false;
                    updateMicIcon();
                };
                
                recognition.onerror = function() {
                    isListening = false;
                    updateMicIcon();
                }
            }
        }

        function toggleVoiceCommand() {
            // Destrancar o áudio do YouTube no primeiro clique do utilizador
            if (!cr7Unlocked && cr7AudioPlayer && typeof cr7AudioPlayer.playVideo === 'function') {
                cr7AudioPlayer.mute();
                cr7AudioPlayer.playVideo();
                setTimeout(() => {
                    cr7AudioPlayer.pauseVideo();
                    cr7AudioPlayer.seekTo(0);
                    cr7AudioPlayer.unMute();
                }, 100);
                cr7Unlocked = true;
            }

            if (!recognition) {
                initVoiceSystem();
                if(!recognition) {
                    alert("Reconhecimento de voz não suportado neste navegador.");
                    return;
                }
            }
            
            if (isListening) {
                recognition.stop();
                isListening = false;
            } else {
                try {
                    recognition.start();
                    isListening = true;
                } catch(e) { console.error(e); }
            }
            updateMicIcon();
        }

        function updateMicIcon() {
            const micIcon = document.getElementById('os-mic-icon');
            if (micIcon) {
                if (isListening) {
                    micIcon.classList.add('listening');
                } else {
                    micIcon.classList.remove('listening');
                }
            }
        }

        function tocarEasterEggCR7() {
            if (cr7AudioPlayer && typeof cr7AudioPlayer.playVideo === 'function') {
                // Pausar outras músicas temporariamente
                const wasPlayingBg = bgPlayer && typeof bgPlayer.getPlayerState === 'function' && bgPlayer.getPlayerState() === YT.PlayerState.PLAYING;
                const wasPlayingSlide = slideAudioPlayer && typeof slideAudioPlayer.getPlayerState === 'function' && slideAudioPlayer.getPlayerState() === YT.PlayerState.PLAYING;
                
                if (wasPlayingBg) bgPlayer.pauseVideo();
                if (wasPlayingSlide) slideAudioPlayer.pauseVideo();
                
                cr7AudioPlayer.seekTo(0);
                cr7AudioPlayer.unMute();
                cr7AudioPlayer.setVolume(100);
                cr7AudioPlayer.playVideo();
                
                // Mostrar um aviso divertido
                const osArea = document.getElementById('os-desktop-area');
                if(osArea) {
                    const div = document.createElement('div');
                    div.className = "absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-[100] text-6xl font-black text-white drop-shadow-[0_0_20px_rgba(249,115,22,1)] animate-[fadeUp_0.5s_ease-out]";
                    div.innerHTML = "SIUUUUU!";
                    osArea.appendChild(div);
                    setTimeout(() => div.remove(), 4000);
                }
                
                // Retomar música após 8 segundos (duração aproximada do áudio)
                setTimeout(() => {
                    if (wasPlayingBg && currentMode === 'os') bgPlayer.playVideo();
                    if (wasPlayingSlide && (currentMode === 'normal' || currentMode === 'os-presentation')) slideAudioPlayer.playVideo();
                }, 8000);
            }
        }

        // ==========================================
        // RENDERIZADORES HTML
        // ==========================================
        function render() {
            if (currentMode === 'start') {
                appDiv.innerHTML = renderStartScreen();
            } else if (currentMode === 'os') {
                appDiv.innerHTML = renderOSDesktop();
                initParticles('os-particles'); // Partículas ativas no OS!
            } else if (currentMode === 'intro' || currentMode === 'os-intro') {
                const container = currentMode === 'intro' ? appDiv : document.getElementById('browser-content');
                container.innerHTML = renderStudioIntro();
            } else if (currentMode === 'normal' || currentMode === 'os-presentation') {
                const container = currentMode === 'normal' ? appDiv : document.getElementById('browser-content');
                container.innerHTML = renderPresentationUI();
                attachPresentationEvents();
                triggerSlideAnimations();
                if(currentMode === 'normal') initParticles('particles-canvas'); // Mantém se for fullscreen
                if (activeSlideIndex === 6) initChart();
            }
        }

        function renderStartScreen() {
            return `
                <div class="flex flex-col items-center justify-center w-full h-full bg-transparent relative overflow-hidden">
                    <div class="absolute w-[800px] h-[800px] bg-brand-orange/20 rounded-full blur-[150px] pointer-events-none"></div>
                    
                    <h1 class="text-6xl md:text-8xl font-montserrat font-black mb-4 z-10 text-center tracking-tighter drop-shadow-2xl">BUDISMO<span class="text-brand-orange">.</span></h1>
                    <p class="text-gray-200 mb-12 z-10 text-center max-w-lg text-lg font-medium drop-shadow-md">Selecione uma experiência visual.</p>
                    
                    <div class="flex flex-col md:flex-row gap-6 z-10 mb-8">
                        <button onclick="playIntro('normal')" class="glass-card group relative px-8 py-5 rounded-xl transition-all duration-300 flex items-center gap-4 w-72 hover:scale-105">
                            <i class="fa-solid fa-play text-2xl group-hover:text-white text-brand-orange"></i>
                            <div class="text-left">
                                <h3 class="font-bold text-lg">Apresentação</h3>
                                <p class="text-xs text-gray-300 group-hover:text-white">Experiência Cinematográfica</p>
                            </div>
                        </button>
                        <button onclick="setMode('os')" class="glass-card group relative px-8 py-5 rounded-xl transition-all duration-300 flex items-center gap-4 w-72 hover:scale-105">
                            <i class="fa-brands fa-windows text-2xl group-hover:text-white text-brand-orange"></i>
                            <div class="text-left">
                                <h3 class="font-bold text-lg">Sistema OS</h3>
                                <p class="text-xs text-gray-300 group-hover:text-white">Simulador Interativo</p>
                            </div>
                        </button>
                    </div>

                    <div class="z-10 mt-4">
                        <button onclick="toggleBgMusic()" class="glass-card flex items-center gap-2 text-xs font-bold transition-colors px-6 py-3 rounded-full border border-white/20 text-brand-orange hover:bg-brand-orange/20 shadow-lg">
                            <i class="fa-solid ${isMusicPlaying ? 'fa-volume-high' : 'fa-volume-xmark'}"></i> 
                            ${isMusicPlaying ? 'MUDO (MENU)' : 'TOCAR SOM (MENU)'}
                        </button>
                    </div>
                </div>
            `;
        }

        function renderStudioIntro() {
            return `
                <div class="w-full h-full bg-black/90 flex flex-col items-center justify-center z-50 overflow-hidden relative backdrop-blur-md">
                    <div class="text-center z-10" id="intro-content-wrapper" style="opacity: 0; transition: opacity 0.5s;">
                        <p class="text-brand-orange font-bold tracking-[0.4em] text-sm md:text-base mb-8 studio-fade drop-shadow-md">DESENVOLVIDO POR</p>
                        <div class="font-montserrat text-xl md:text-4xl font-bold tracking-wider text-white mb-6 drop-shadow-[0_0_15px_rgba(255,255,255,0.5)]">
                            ${createStudioText(emails[0])}
                        </div>
                        <div class="font-montserrat text-xl md:text-4xl font-bold tracking-wider text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.5)]">
                            ${createStudioText(emails[1])}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderOSDesktop() {
            // Se o browser estiver aberto, mantemos ele aberto no re-render
            const isBrowserOpen = document.getElementById('browser-window') && !document.getElementById('browser-window').classList.contains('hidden');
            
            return `
                <div id="os-desktop-area" class="w-full h-full bg-transparent relative flex flex-col font-inter z-20">
                    
                    <!-- Fundo Animado do OS -->
                    <canvas id="os-particles" class="absolute inset-0 pointer-events-none z-0"></canvas>
                    <div class="absolute inset-0 bg-gradient-to-b from-transparent to-black/60 pointer-events-none z-0"></div>

                    <!-- Ícones do Desktop -->
                    <div class="flex-1 p-6 flex flex-col gap-6 items-start z-10">
                        <div onclick="openOSBrowser()" class="flex flex-col items-center gap-2 cursor-pointer os-glass p-4 rounded-xl w-28 text-center group hover:bg-white/10 transition-all border border-white/10 hover:border-brand-orange/40">
                            <div class="w-14 h-14 bg-white/10 rounded-full flex items-center justify-center shadow-lg group-hover:scale-110 transition-transform backdrop-blur-sm">
                                <i class="fa-brands fa-chrome text-white text-3xl"></i>
                            </div>
                            <span class="text-xs font-semibold text-white drop-shadow-md tracking-wide">Navegador</span>
                        </div>
                    </div>
                    
                    <!-- Barra de Tarefas (OS Glass) -->
                    <div class="h-14 os-glass rounded-none border-x-0 border-b-0 border-t border-white/10 flex items-center px-6 justify-between z-40 text-white">
                        <div class="flex items-center gap-6">
                            <i class="fa-brands fa-windows text-2xl hover:text-brand-orange cursor-pointer transition-colors" title="Iniciar" onclick="setMode('start')"></i>
                            
                            <!-- Search Bar Style -->
                            <div class="hidden md:flex items-center bg-black/40 rounded-full px-4 py-1.5 border border-white/5">
                                <i class="fa-solid fa-magnifying-glass text-gray-400 text-xs"></i>
                                <span class="text-xs text-gray-400 ml-3">Procurar aplicativos...</span>
                            </div>
                        </div>

                        <div class="flex items-center gap-5">
                            <!-- Ícone do Easter Egg (Microfone) -->
                            <i id="os-mic-icon" class="fa-solid fa-microphone text-gray-300 hover:text-white cursor-pointer transition-all ${isListening ? 'listening' : ''}" title="Assistente de Voz (Diga CR7)" onclick="toggleVoiceCommand()"></i>
                            <i class="fa-solid fa-wifi text-gray-300"></i>
                            <span id="os-clock" class="text-sm font-semibold tracking-wide ml-2">12:00</span>
                        </div>
                    </div>

                    <!-- Janela do Browser -->
                    <div id="browser-window" class="${isBrowserOpen ? '' : 'hidden'} absolute top-0 left-0 w-full h-[calc(100%-3.5rem)] bg-white rounded-none flex-col overflow-hidden z-50 flex shadow-2xl">
                        <!-- Top Bar do Browser -->
                        <div class="h-12 bg-gray-100 flex items-center px-4 justify-between border-b border-gray-300">
                            <div class="flex gap-2">
                                <div onclick="closeOSBrowser()" class="w-3.5 h-3.5 rounded-full bg-red-500 cursor-pointer hover:bg-red-600 shadow-inner"></div>
                                <div class="w-3.5 h-3.5 rounded-full bg-yellow-500 cursor-pointer shadow-inner"></div>
                                <div class="w-3.5 h-3.5 rounded-full bg-green-500 cursor-pointer shadow-inner"></div>
                            </div>
                            <div class="flex-1 mx-6">
                                <div class="bg-white rounded-lg px-4 py-1.5 text-xs text-gray-600 flex items-center gap-3 border border-gray-300 shadow-inner max-w-2xl mx-auto">
                                    <i class="fa-solid fa-shield-halved text-green-600"></i>
                                    <span class="flex-1" id="url-bar">https://google.com</span>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Conteúdo do Browser -->
                        <div id="browser-content" class="flex-1 relative bg-white flex flex-col items-center justify-center overflow-hidden">
                            <div id="google-search-screen" class="flex flex-col items-center w-full max-w-2xl px-6">
                                <h1 class="text-7xl font-bold mb-8 tracking-tighter" style="color: #4285F4;">
                                    G<span style="color: #EA4335">o</span><span style="color: #FBBC05">o</span>g<span style="color: #34A853">l</span><span style="color: #EA4335">e</span>
                                </h1>
                                <div class="w-full flex items-center border border-gray-300 hover:shadow-lg rounded-full px-6 py-4 transition-shadow cursor-text" onclick="startGoogleSearch()">
                                    <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
                                    <input id="search-input" type="text" class="flex-1 outline-none ml-3 text-black text-lg cursor-pointer bg-transparent" placeholder="Pesquise sobre Budismo..." readonly>
                                    <i class="fa-solid fa-microphone text-blue-500 cursor-pointer text-lg"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderPresentationUI() {
            const slide = slidesData[activeSlideIndex];
            
            let statsHTML = '';
            slide.stats.forEach(stat => {
                statsHTML += `
                    <div class="flex items-center gap-4 text-xs md:text-sm mb-3">
                        <span class="w-28 text-white font-medium drop-shadow-md">${stat.label}</span>
                        <div class="h-2 flex-1 bg-gray-900/80 rounded-full overflow-hidden max-w-[200px] border border-gray-600/50">
                            <div class="h-full bg-gradient-to-r from-brand-orange to-brand-amber relative rounded-full" style="width: ${stat.value}%"></div>
                        </div>
                        <span class="text-brand-orange font-bold text-xs drop-shadow-md">${stat.value}%</span>
                    </div>
                `;
            });

            let cardsHTML = '';
            slidesData.forEach((item, index) => {
                const isChart = item.id === 7;
                const imgSrc = isChart ? 'https://images.unsplash.com/photo-1551288049-bebda4e38f71?auto=format&fit=crop&q=80&w=200' : item.image;
                const isActive = index === activeSlideIndex;
                const activeStyle = isActive 
                    ? 'border-brand-orange shadow-[0_0_25px_rgba(249,115,22,0.6)] bg-white/10 scale-105 translate-y-[-8px]' 
                    : 'border-transparent hover:border-white/30 hover:bg-white/5 hover:-translate-y-2 opacity-70 hover:opacity-100';

                cardsHTML += `
                    <div onclick="changeSlide(${index})" class="glass-card rounded-2xl flex p-3 min-w-[280px] md:min-w-[320px] cursor-pointer transition-all duration-500 border-2 ${activeStyle} relative overflow-hidden group mx-1">
                        ${isActive ? '<div class="absolute inset-0 bg-gradient-to-r from-brand-orange/20 to-transparent pointer-events-none"></div>' : ''}
                        <div class="relative">
                            <img src="${imgSrc}" class="w-16 h-20 md:w-20 md:h-24 object-cover rounded-xl shrink-0 shadow-lg group-hover:shadow-brand-orange/50 transition-shadow duration-300">
                            <div class="absolute -top-2 -left-2 bg-black/90 text-white text-[10px] font-black w-6 h-6 flex items-center justify-center rounded-full border border-brand-orange/50 shadow-lg">${index + 1}</div>
                        </div>
                        <div class="ml-4 flex flex-col justify-center flex-1 z-10">
                            <h4 class="font-bold text-sm md:text-base uppercase text-white drop-shadow-md group-hover:text-brand-orange transition-colors">${item.navTitle}</h4>
                            <span class="text-gray-300 text-[10px] md:text-xs font-semibold tracking-widest mt-1">${item.navSub}</span>
                            ${isActive ? '<div class="w-full h-1 bg-black/50 rounded-full mt-3 overflow-hidden"><div class="h-full bg-brand-orange w-full animate-pulse"></div></div>' : ''}
                        </div>
                    </div>
                `;
            });

            return `
                <div class="w-full h-full bg-transparent flex flex-col relative overflow-hidden z-10 text-white backdrop-blur-[2px]">
                    <canvas id="particles-canvas" class="absolute inset-0 pointer-events-none z-0"></canvas>
                    
                    <header class="flex justify-between items-center p-6 md:px-12 md:py-8 z-20">
                        <div class="font-montserrat font-black text-xl tracking-widest cursor-pointer hover:text-brand-orange transition drop-shadow-xl" onclick="setMode('start')">
                            BUDISMO<span class="text-brand-orange">.</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <button onclick="toggleBgMusic()" class="glass-card flex items-center gap-2 text-xs font-bold transition-colors px-4 py-2 rounded-full border border-white/20 text-brand-orange hover:bg-brand-orange/20 shadow-lg">
                                <i class="fa-solid ${isMusicPlaying ? 'fa-pause' : 'fa-play'}"></i> 
                                ${isMusicPlaying ? 'MUTAR MÚSICA' : 'TOCAR MÚSICA'}
                            </button>
                            <div class="text-brand-orange text-xs font-bold glass-card px-4 py-2 rounded-full border border-brand-orange/30 hidden md:block shadow-lg">
                                USE W A S D PARA NAVEGAR
                            </div>
                        </div>
                    </header>

                    <main class="flex-1 flex flex-col md:flex-row relative z-10 px-6 md:px-12 pb-[100px]">
                        <div class="flex-1 flex flex-col justify-center md:pr-12 relative z-20">
                            <div id="anim-text" class="slide-enter">
                                <h1 class="font-montserrat font-black text-5xl md:text-6xl lg:text-7xl leading-[0.9] mb-4 tracking-tighter drop-shadow-[0_4px_10px_rgba(0,0,0,0.8)]">
                                    ${slide.title.replace('.', '<span class="text-brand-orange">.</span>')}
                                </h1>
                                <h2 class="text-brand-orange font-bold tracking-[0.2em] uppercase text-xs md:text-sm mb-6 glass-card inline-block px-4 py-1.5 rounded shadow-xl border border-brand-orange/30">
                                    ${slide.subtitle}
                                </h2>
                                <p class="text-gray-100 text-sm md:text-base leading-relaxed max-w-lg mb-8 font-medium drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] glass-card p-5 rounded-2xl">
                                    ${slide.description}
                                </p>
                                <div class="w-full max-w-sm h-px bg-gradient-to-r from-brand-orange to-transparent mb-6"></div>
                                <div class="stats-container glass-card p-4 rounded-xl border border-white/5 inline-block min-w-[300px]">
                                    ${statsHTML}
                                </div>
                            </div>
                        </div>

                        <div class="flex-1 relative hidden md:flex items-center justify-center">
                            <div id="anim-img" class="img-enter float-anim w-full h-[65vh] relative z-10 flex items-center justify-center">
                                ${slide.id === 7 
                                    ? `<div class="w-full max-w-md glass-card p-6 rounded-3xl border border-white/20 shadow-[0_20px_50px_rgba(0,0,0,0.5)]"><canvas id="buddhismChart"></canvas></div>` 
                                    : `<img src="${slide.image}" class="h-full w-auto object-cover object-center image-mask drop-shadow-[0_20px_50px_rgba(0,0,0,0.5)] rounded-2xl border border-white/10">`
                                }
                            </div>
                        </div>
                    </main>

                    <div id="bottom-hover-trigger" onmouseenter="showBottomBar()" onmouseleave="hideBottomBarAfterDelay()"></div>
                    <div id="bottom-nav-bar" class="absolute bottom-6 md:bottom-8 left-0 w-full px-6 md:px-12 z-30 translate-y-[150%]">
                        <div class="flex gap-4 md:gap-6 overflow-x-auto pb-8 pt-4 px-2 hide-scroll items-end" onmouseenter="clearBottomBarTimeout()" onmouseleave="hideBottomBarAfterDelay()">
                            ${cardsHTML}
                        </div>
                    </div>
                </div>
            `;
        }

        // ==========================================
        // LÓGICA DE TRANSIÇÃO E VÍDEOS DE FUNDO
        // ==========================================
        function toggleBgMusic() {
            if (currentMode === 'start' || currentMode === 'os') {
                if (!bgPlayer || typeof bgPlayer.isMuted !== 'function') return;
                if (bgPlayer.isMuted()) {
                    bgPlayer.unMute();
                    bgPlayer.setVolume(100);
                    isMusicPlaying = true;
                } else {
                    bgPlayer.mute();
                    isMusicPlaying = false;
                }
            } else {
                if (!slideAudioPlayer || typeof slideAudioPlayer.isMuted !== 'function') return;
                if (slideAudioPlayer.isMuted()) {
                    slideAudioPlayer.unMute();
                    slideAudioPlayer.setVolume(100);
                    isMusicPlaying = true;
                } else {
                    slideAudioPlayer.mute();
                    isMusicPlaying = false;
                }
            }
            render();
        }

        function setMode(mode) {
            currentMode = mode;
            if (mode === 'start' || mode === 'os') activeSlideIndex = 0;
            
            const v1 = document.getElementById('video-layer-1');
            const v2 = document.getElementById('video-layer-2');
            const overlay2 = document.getElementById('video-2-overlay');

            if (mode === 'start' || mode === 'os') {
                v1.style.opacity = '1';
                v2.style.opacity = '0';
                
                if (slideVideoPlayer && slideVideoPlayer.pauseVideo) slideVideoPlayer.pauseVideo();
                if (slideAudioPlayer && slideAudioPlayer.pauseVideo) slideAudioPlayer.pauseVideo();
                
                if (bgPlayer && bgPlayer.playVideo) {
                    bgPlayer.playVideo();
                    if (typeof bgPlayer.isMuted === 'function') {
                        isMusicPlaying = !bgPlayer.isMuted();
                    }
                }

            } else if (mode === 'intro' || mode === 'os-intro') {
                v1.style.opacity = '0';
                v2.style.opacity = '1';
                overlay2.className = "absolute inset-0 bg-black/40 transition-colors duration-1000"; 

            } else if (mode === 'normal' || mode === 'os-presentation') {
                v1.style.opacity = '0';
                v2.style.opacity = '1';
                overlay2.className = "absolute inset-0 bg-black/80 transition-colors duration-1000"; 
            }

            render();
            if (mode === 'os') startClock();
        }

        function playIntro(targetMode) {
            if (bgPlayer && bgPlayer.pauseVideo) bgPlayer.pauseVideo();
            
            if (slideVideoPlayer && slideVideoPlayer.playVideo) {
                slideVideoPlayer.seekTo(0);
                slideVideoPlayer.mute(); 
                slideVideoPlayer.playVideo();
            }

            if (slideAudioPlayer && slideAudioPlayer.playVideo) {
                slideAudioPlayer.seekTo(0);
                slideAudioPlayer.unMute();
                slideAudioPlayer.setVolume(100);
                slideAudioPlayer.playVideo();
                isMusicPlaying = true;
            }

            setMode(targetMode === 'os-presentation' ? 'os-intro' : 'intro');

            let animationStarted = false;
            const triggerIntroAnimations = () => {
                if (animationStarted) return;
                animationStarted = true;

                const wrapper = document.getElementById('intro-content-wrapper');
                if (wrapper) wrapper.style.opacity = '1';

                const fadeEl = document.querySelector('.studio-fade');
                if (fadeEl) fadeEl.classList.add('fade-anim');

                const letters = document.querySelectorAll('.studio-letter');
                letters.forEach((letter, index) => {
                    setTimeout(() => { letter.classList.add('drop-anim'); }, 800 + (index * 50)); 
                });

                setTimeout(() => {
                    setMode(targetMode);
                }, 5500);
            };

            setTimeout(triggerIntroAnimations, 500);
        }

        // --- Navegação ---
        function changeSlide(index) {
            if (activeSlideIndex === index) return;
            activeSlideIndex = index;
            render();
            showBottomBarTemporarily();
        }

        function triggerSlideAnimations() {
            const textAnim = document.getElementById('anim-text');
            const imgAnim = document.getElementById('anim-img');
            if (textAnim) { textAnim.classList.remove('slide-enter'); void textAnim.offsetWidth; textAnim.classList.add('slide-enter'); }
            if (imgAnim) { imgAnim.classList.remove('img-enter'); void imgAnim.offsetWidth; imgAnim.classList.add('img-enter'); }
        }

        function showBottomBar() { const bar = document.getElementById('bottom-nav-bar'); if (bar) bar.classList.remove('translate-y-[150%]'); }
        function hideBottomBar() { const bar = document.getElementById('bottom-nav-bar'); if (bar) bar.classList.add('translate-y-[150%]'); }
        function clearBottomBarTimeout() { if (bottomBarTimeout) clearTimeout(bottomBarTimeout); }
        function hideBottomBarAfterDelay() { clearBottomBarTimeout(); bottomBarTimeout = setTimeout(hideBottomBar, 2500); }
        function showBottomBarTemporarily() { showBottomBar(); hideBottomBarAfterDelay(); }

        function attachPresentationEvents() {
            document.onkeydown = function(e) {
                if (!currentMode.includes('normal') && !currentMode.includes('os-presentation')) return;
                const key = e.key.toLowerCase();
                if (key === 'arrowright' || key === 'd' || key === 'w' || key === 'arrowup') { changeSlide((activeSlideIndex + 1) % slidesData.length); } 
                else if (key === 'arrowleft' || key === 'a' || key === 's' || key === 'arrowdown') { changeSlide((activeSlideIndex - 1 + slidesData.length) % slidesData.length); }
            };
        }

        // --- MODO OS ---
        let clockInterval;
        function startClock() {
            clearInterval(clockInterval);
            const updateTime = () => { const el = document.getElementById('os-clock'); if(el) el.innerText = new Date().toLocaleTimeString('pt-PT', {hour: '2-digit', minute:'2-digit'}); };
            updateTime(); clockInterval = setInterval(updateTime, 60000);
        }

        function openOSBrowser() { const win = document.getElementById('browser-window'); if (win) win.classList.remove('hidden'); }
        function closeOSBrowser() { const win = document.getElementById('browser-window'); if (win) { win.classList.add('hidden'); setTimeout(() => { if(currentMode === 'os-presentation' || currentMode === 'os-intro') setMode('os'); }, 300); } }

        function startGoogleSearch() {
            const input = document.getElementById('search-input');
            if (!input || input.value !== "") return;
            const textToType = "Apresentação sobre Budismo";
            let i = 0;
            const typeInterval = setInterval(() => {
                input.value += textToType.charAt(i); i++;
                if (i >= textToType.length) {
                    clearInterval(typeInterval);
                    setTimeout(() => { 
                        const urlBar = document.getElementById('url-bar'); 
                        if(urlBar) urlBar.innerText = "budismo.app/apresentacao"; 
                        document.getElementById('browser-content').style.backgroundColor = "black";
                        playIntro('os-presentation'); 
                    }, 600);
                }
            }, 50);
        }

        function initChart() {
            const ctx = document.getElementById('buddhismChart');
            if (!ctx) return;
            if (chartInstance) chartInstance.destroy();
            Chart.defaults.color = '#fff';
            chartInstance = new Chart(ctx, {
                type: 'doughnut', data: { labels: ['Ásia-Pacífico', 'Américas', 'Europa'], datasets: [{ data: [85, 10, 5], backgroundColor: ['#f97316', '#fb923c', '#fdba74'], borderWidth: 0, hoverOffset: 15 }] },
                options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { font: { family: 'Inter', size: 13 } } }, title: { display: true, text: 'Distribuição Demográfica', font: { family: 'Montserrat', size: 16 } } }, cutout: '75%' }
            });
        }
    </script>
</body>
</html>
