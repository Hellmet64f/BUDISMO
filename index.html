<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apresentação: Budismo</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        montserrat: ['Montserrat', 'sans-serif'],
                        inter: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            orange: '#f97316',
                            amber: '#f59e0b',
                            dark: '#050505',
                            darker: '#000000',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        /* --- TELA DE CARREGAMENTO --- */
        #loading-screen {
            position: fixed; inset: 0; z-index: 9999;
            background-color: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1s ease;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid rgba(249, 115, 22, 0.2);
            border-top-color: #f97316;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- VÍDEOS DE FUNDO DO YOUTUBE --- */
        .video-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            transition: opacity 1.5s ease-in-out;
            pointer-events: none;
            overflow: hidden;
        }
        
        .yt-bg-iframe {
            position: absolute;
            top: 50%; left: 50%;
            width: 100vw; height: 100vh;
            /* Escala o vídeo muito além dos limites para esconder controlos e barras pretas */
            transform: translate(-50%, -50%) scale(1.8);
            pointer-events: none;
            border: none;
        }

        /* Scrollbar customizada */
        .custom-scrollbar::-webkit-scrollbar { height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(249,115,22,0.5); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(249,115,22,1); }

        /* Animações da Apresentação */
        .slide-enter { animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(40px); }
        .img-enter { animation: fadeLeft 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateX(60px); }
        .float-anim { animation: float 6s ease-in-out infinite; }

        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeLeft { to { opacity: 1; transform: translateX(0); } }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-15px); } 100% { transform: translateY(0px); } }

        /* Estilo Glassmorphism (Vidro Fosco) */
        .glass-card {
            background: rgba(10, 10, 10, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .glass-card:hover { background: rgba(20, 20, 20, 0.6); border-color: rgba(249, 115, 22, 0.5); }

        /* --- ANIMAÇÕES CONTROLADAS DA INTRO (ESTÚDIO) --- */
        .studio-letter { display: inline-block; opacity: 0; transform-origin: bottom center; }
        .studio-letter.drop-anim { animation: dropBounce 1.2s cubic-bezier(0.28, 0.84, 0.42, 1) forwards; }
        @keyframes dropBounce {
            0% { transform: translateY(-300px) scaleY(1.5) rotate(15deg); opacity: 0; filter: blur(5px); }
            50% { transform: translateY(10px) scaleY(0.8) rotate(-5deg); opacity: 1; filter: blur(0px); }
            70% { transform: translateY(-5px) scaleY(1.05) rotate(2deg); }
            100% { transform: translateY(0) scaleY(1) rotate(0deg); opacity: 1; text-shadow: 0 0 20px rgba(249,115,22,0.8); }
        }
        
        .studio-fade { opacity: 0; }
        .studio-fade.fade-anim { animation: fadeUp 1s ease forwards; }

        /* Barra Inferior Animada */
        #bottom-nav-bar { transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        #bottom-hover-trigger { position: absolute; bottom: 0; left: 0; width: 100%; height: 60px; z-index: 25; }
    </style>
</head>
<body>

    <!-- TELA DE CARREGAMENTO INICIAL -->
    <div id="loading-screen">
        <div class="spinner mb-6"></div>
        <h2 class="font-montserrat font-bold text-xl tracking-widest animate-pulse">A INICIALIZAR EXPERIÊNCIA...</h2>
        <p class="text-gray-500 text-sm mt-2">A carregar conteúdos multimédia.</p>
    </div>

    <!-- CAMADAS DE VÍDEO DE FUNDO -->
    
    <!-- Camada 1: Vídeo das Opções (Short) -->
    <div id="video-layer-1" class="video-layer opacity-100">
        <div id="bg-player-div"></div>
        <div class="absolute inset-0 bg-black/50"></div> <!-- Escurece para leitura -->
    </div>

    <!-- Camada 2: Vídeo da Intro e Apresentação (God of War) -->
    <div id="video-layer-2" class="video-layer opacity-0">
        <div id="intro-player-div"></div>
        <div id="video-2-overlay" class="absolute inset-0 bg-black/40 transition-colors duration-1000"></div> <!-- Fica mais escuro nos slides -->
    </div>

    <!-- APLICAÇÃO PRINCIPAL (UI SOBREPOSTA AOS VÍDEOS) -->
    <div id="app" class="w-full h-screen w-screen relative z-10 hidden"></div>

    <script>
        // ==========================================
        // CONFIGURAÇÃO DO YOUTUBE API E CARREGAMENTO
        // ==========================================
        let bgPlayer, introPlayer;
        let playersReadyCount = 0;
        let isMusicPlaying = false;
        let forceStartTimeout;
        
        // Carrega o script da API do YouTube
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            // Player 1: Fundo de Opções (Short)
            bgPlayer = new YT.Player('bg-player-div', {
                videoId: 's7i98_DeB04',
                playerVars: { 'autoplay': 1, 'controls': 0, 'loop': 1, 'playlist': 's7i98_DeB04', 'mute': 1, 'disablekb': 1, 'showinfo': 0, 'rel': 0 },
                events: { 'onReady': onPlayerReady }
            });

            // Player 2: Intro/Slides (God of War)
            introPlayer = new YT.Player('intro-player-div', {
                videoId: 'x0-xFqvJ-U8',
                playerVars: { 'autoplay': 0, 'controls': 0, 'disablekb': 1, 'showinfo': 0, 'rel': 0, 'loop': 1, 'playlist': 'x0-xFqvJ-U8' },
                events: { 'onReady': onPlayerReady }
            });

            // FALLBACK ANTI-TRAVAMENTO: Se os vídeos demorarem mais de 6 segundos, força o início.
            forceStartTimeout = setTimeout(() => {
                if(playersReadyCount < 2) forceStartApp();
            }, 6000);
        }

        function onPlayerReady(event) {
            event.target.getIframe().classList.add('yt-bg-iframe');
            playersReadyCount++;
            
            if (playersReadyCount === 2) {
                clearTimeout(forceStartTimeout); // Cancela o fallback
                bgPlayer.playVideo(); // Toca o fundo mudo
                forceStartApp();
            }
        }

        function forceStartApp() {
            const loadingScreen = document.getElementById('loading-screen');
            loadingScreen.style.opacity = '0';
            setTimeout(() => {
                loadingScreen.style.display = 'none';
                document.getElementById('app').classList.remove('hidden');
                setMode('start');
            }, 800);
        }

        // ==========================================
        // DADOS DA APRESENTAÇÃO
        // ==========================================
        const emails = ["miguel-rmontana@estudante.rs.gov.br", "gabriel-efdslopes@estudante.rs.gov.br"];

        const slidesData = [
            { id: 1, title: "O BUDISMO.", subtitle: "O CAMINHO DO MEIO", description: "O Budismo é uma filosofia e religião não-teísta que surgiu na Índia antiga. Baseia-se nos ensinamentos de Siddhartha Gautama, o Buda.", stats: [{ label: "Paz Interior", value: 95 }, { label: "Compaixão", value: 90 }, { label: "Atenção", value: 98 }], image: "https://images.unsplash.com/photo-1584286595398-a59f21d313f5?auto=format&fit=crop&q=80", navTitle: "INTRO", navSub: "O QUE É" },
            { id: 2, title: "SIDDHARTHA.", subtitle: "A HISTÓRIA DO PRÍNCIPE", description: "Siddhartha Gautama era um príncipe que vivia protegido. Ao sair do palácio, deparou-se com as 'Quatro Visões' e renunciou à riqueza para procurar a iluminação.", stats: [{ label: "Renúncia", value: 100 }, { label: "Resiliência", value: 95 }, { label: "Iluminação", value: 100 }], image: "https://images.unsplash.com/photo-1599009434802-ca1dd09895e7?auto=format&fit=crop&q=80", navTitle: "A ORIGEM", navSub: "O BUDA" },
            { id: 3, title: "AS 4 VERDADES.", subtitle: "O FUNDAMENTO", description: "1) A vida inclui sofrimento. 2) A causa é o apego. 3) Existe um fim para o sofrimento. 4) O caminho é o Nobre Caminho Óctuplo.", stats: [{ label: "Aceitação", value: 92 }, { label: "Lógica", value: 88 }, { label: "Ética", value: 96 }], image: "https://images.unsplash.com/photo-1517584318721-e0e643c16266?auto=format&fit=crop&q=80", navTitle: "VERDADES", navSub: "DOUTRINA" },
            { id: 4, title: "MEDITAÇÃO.", subtitle: "A PRÁTICA DO DESPERTAR", description: "Ferramenta central para cultivar atenção. O objetivo não é esvaziar a mente, mas observar os pensamentos sem apego, ganhando clareza.", stats: [{ label: "Foco", value: 98 }, { label: "Respiração", value: 95 }, { label: "Calma", value: 90 }], image: "https://images.unsplash.com/photo-1545389336-eaeecece96ef?auto=format&fit=crop&q=80", navTitle: "PRÁTICA", navSub: "MEDITAÇÃO" },
            { id: 5, title: "CIDADES.", subtitle: "GEOGRAFIA SAGRADA", description: "As principais cidades de peregrinação: Lumbini (nascimento), Bodh Gaya (iluminação), Sarnath (primeiro sermão) e Kushinagar.", stats: [{ label: "Bodh Gaya", value: 100 }, { label: "Lumbini", value: 90 }, { label: "Sarnath", value: 85 }], image: "https://images.unsplash.com/photo-1605647540924-852290f6b0d5?auto=format&fit=crop&q=80", navTitle: "GEOGRAFIA", navSub: "LOCAIS" },
            { id: 6, title: "ESCOLAS.", subtitle: "VERTENTES E EXPANSÃO", description: "O Budismo dividiu-se em veículos: Theravada (Anciãos, sudeste asiático), Mahayana (Grande Veículo, Ásia Oriental) e Vajrayana (Tibetano).", stats: [{ label: "Theravada", value: 80 }, { label: "Mahayana", value: 95 }, { label: "Vajrayana", value: 70 }], image: "https://images.unsplash.com/photo-1551445496-613d78bdcb82?auto=format&fit=crop&q=80", navTitle: "VERTENTES", navSub: "ESCOLAS" },
            { id: 7, title: "DEMOGRAFIA.", subtitle: "NO MUNDO", description: "Quarta maior religião do mundo (+500 milhões de adeptos). A grande maioria vive na Ásia-Pacífico. No Ocidente, cresce através da meditação secular.", stats: [{ label: "Ásia", value: 98 }, { label: "Américas", value: 10 }, { label: "Europa", value: 5 }], image: "none", navTitle: "GRÁFICOS", navSub: "ESTATÍSTICAS" }
        ];

        let currentMode = 'loading'; 
        let activeSlideIndex = 0;
        let chartInstance = null;
        let bottomBarTimeout = null;

        const appDiv = document.getElementById('app');

        // ==========================================
        // UTILITÁRIOS
        // ==========================================
        function createStudioText(text) {
            return text.split('').map((char) => {
                if (char === ' ') return '&nbsp;';
                return `<span class="studio-letter">${char}</span>`;
            }).join('');
        }

        // ==========================================
        // RENDERIZADORES HTML
        // ==========================================
        function render() {
            if (currentMode === 'start') {
                appDiv.innerHTML = renderStartScreen();
            } else if (currentMode === 'os') {
                appDiv.innerHTML = renderOSDesktop();
            } else if (currentMode === 'intro' || currentMode === 'os-intro') {
                const container = currentMode === 'intro' ? appDiv : document.getElementById('browser-content');
                container.innerHTML = renderStudioIntro();
            } else if (currentMode === 'normal' || currentMode === 'os-presentation') {
                const container = currentMode === 'normal' ? appDiv : document.getElementById('browser-content');
                container.innerHTML = renderPresentationUI();
                attachPresentationEvents();
                triggerSlideAnimations();
                if (activeSlideIndex === 6) initChart();
            }
        }

        function renderStartScreen() {
            return `
                <div class="flex flex-col items-center justify-center w-full h-full bg-transparent relative overflow-hidden">
                    <div class="absolute w-[800px] h-[800px] bg-brand-orange/20 rounded-full blur-[150px] pointer-events-none"></div>
                    
                    <h1 class="text-6xl md:text-8xl font-montserrat font-black mb-4 z-10 text-center tracking-tighter drop-shadow-2xl">BUDISMO<span class="text-brand-orange">.</span></h1>
                    <p class="text-gray-200 mb-12 z-10 text-center max-w-lg text-lg font-medium drop-shadow-md">Selecione uma experiência visual.</p>
                    
                    <div class="flex flex-col md:flex-row gap-6 z-10 mb-8">
                        <button onclick="playIntro('normal')" class="glass-card group relative px-8 py-5 rounded-xl transition-all duration-300 flex items-center gap-4 w-72 hover:scale-105">
                            <i class="fa-solid fa-play text-2xl group-hover:text-white text-brand-orange"></i>
                            <div class="text-left">
                                <h3 class="font-bold text-lg">Apresentação</h3>
                                <p class="text-xs text-gray-300 group-hover:text-white">Experiência Cinematográfica</p>
                            </div>
                        </button>
                        <button onclick="setMode('os')" class="glass-card group relative px-8 py-5 rounded-xl transition-all duration-300 flex items-center gap-4 w-72 hover:scale-105">
                            <i class="fa-brands fa-windows text-2xl group-hover:text-white text-brand-orange"></i>
                            <div class="text-left">
                                <h3 class="font-bold text-lg">Sistema OS</h3>
                                <p class="text-xs text-gray-300 group-hover:text-white">Simulador Interativo</p>
                            </div>
                        </button>
                    </div>
                </div>
            `;
        }

        function renderStudioIntro() {
            return `
                <div class="w-full h-full bg-transparent flex flex-col items-center justify-center z-50 overflow-hidden relative">
                    <div class="text-center z-10" id="intro-content-wrapper" style="opacity: 0; transition: opacity 0.5s;">
                        <p class="text-brand-orange font-bold tracking-[0.4em] text-sm md:text-base mb-8 studio-fade drop-shadow-md">DESENVOLVIDO POR</p>
                        <div class="font-montserrat text-xl md:text-4xl font-bold tracking-wider text-white mb-6 drop-shadow-[0_0_15px_rgba(255,255,255,0.5)]">
                            ${createStudioText(emails[0])}
                        </div>
                        <div class="font-montserrat text-xl md:text-4xl font-bold tracking-wider text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.5)]">
                            ${createStudioText(emails[1])}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderOSDesktop() {
            return `
                <div class="w-full h-full bg-transparent relative flex flex-col font-inter z-20">
                    <div class="flex-1 p-4 flex flex-col gap-6 items-start">
                        <div onclick="openOSBrowser()" class="flex flex-col items-center gap-1 cursor-pointer glass-card p-3 rounded-lg w-24 text-center group">
                            <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center drop-shadow-xl group-hover:scale-110 transition-transform">
                                <i class="fa-brands fa-google text-blue-500 text-2xl"></i>
                            </div>
                            <span class="text-xs font-semibold drop-shadow-md mt-2 text-white">Navegador</span>
                        </div>
                    </div>
                    
                    <div class="h-12 glass-card rounded-none border-x-0 border-b-0 border-t border-white/20 flex items-center px-4 justify-between z-40 text-white">
                        <i class="fa-brands fa-windows text-xl hover:text-brand-orange cursor-pointer"></i>
                        <span id="os-clock" class="text-sm font-medium">12:00</span>
                    </div>

                    <div id="browser-window" class="hidden absolute top-[5%] left-[5%] md:left-[10%] w-[90%] md:w-[80%] h-[85%] bg-white rounded-lg flex-col overflow-hidden z-50 flex shadow-2xl border border-gray-400">
                        <div class="h-10 bg-gray-200 flex items-center px-4 justify-between border-b border-gray-300">
                            <div class="flex gap-2">
                                <div onclick="closeOSBrowser()" class="w-3 h-3 rounded-full bg-red-500 cursor-pointer shadow-inner"></div>
                                <div class="w-3 h-3 rounded-full bg-yellow-500 cursor-pointer shadow-inner"></div>
                                <div class="w-3 h-3 rounded-full bg-green-500 cursor-pointer shadow-inner"></div>
                            </div>
                            <div class="flex-1 mx-4">
                                <div class="bg-white rounded-md px-3 py-1 text-xs text-gray-600 flex items-center gap-2 border border-gray-300 shadow-inner max-w-lg mx-auto">
                                    <i class="fa-solid fa-lock text-gray-400"></i>
                                    <span class="flex-1 text-center" id="url-bar">google.com</span>
                                </div>
                            </div>
                        </div>
                        <div id="browser-content" class="flex-1 relative bg-white flex flex-col items-center justify-center">
                            <div id="google-search-screen" class="flex flex-col items-center w-full max-w-2xl px-6">
                                <h1 class="text-6xl font-bold mb-8 tracking-tighter" style="color: #4285F4;">
                                    G<span style="color: #EA4335">o</span><span style="color: #FBBC05">o</span>g<span style="color: #34A853">l</span><span style="color: #EA4335">e</span>
                                </h1>
                                <div class="w-full flex items-center border border-gray-300 hover:shadow-md rounded-full px-5 py-3 transition cursor-text" onclick="startGoogleSearch()">
                                    <i class="fa-solid fa-search text-gray-400"></i>
                                    <input id="search-input" type="text" class="flex-1 outline-none ml-3 text-black text-lg cursor-pointer bg-transparent" placeholder="Clique para pesquisar..." readonly>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderPresentationUI() {
            const slide = slidesData[activeSlideIndex];
            
            let statsHTML = '';
            slide.stats.forEach(stat => {
                statsHTML += `
                    <div class="flex items-center gap-4 text-xs md:text-sm mb-3">
                        <span class="w-28 text-white font-medium drop-shadow-md">${stat.label}</span>
                        <div class="h-2 flex-1 bg-gray-900/80 rounded-full overflow-hidden max-w-[200px] border border-gray-600/50">
                            <div class="h-full bg-gradient-to-r from-brand-orange to-brand-amber relative rounded-full" style="width: ${stat.value}%"></div>
                        </div>
                        <span class="text-brand-orange font-bold text-xs drop-shadow-md">${stat.value}%</span>
                    </div>
                `;
            });

            let cardsHTML = '';
            slidesData.forEach((item, index) => {
                const isChart = item.id === 7;
                const imgSrc = isChart ? 'https://images.unsplash.com/photo-1551288049-bebda4e38f71?auto=format&fit=crop&q=80&w=200' : item.image;
                const activeStyle = index === activeSlideIndex ? 'border-brand-orange shadow-[0_0_20px_rgba(249,115,22,0.8)] bg-white/20' : 'border-transparent hover:border-gray-300';

                cardsHTML += `
                    <div onclick="changeSlide(${index})" class="glass-card rounded-2xl flex p-2 min-w-[260px] md:min-w-[300px] cursor-pointer transition-all duration-300 border-2 ${activeStyle}">
                        <img src="${imgSrc}" class="w-16 h-20 md:h-24 object-cover rounded-xl shrink-0">
                        <div class="ml-4 flex flex-col justify-center flex-1">
                            <h4 class="font-bold text-sm uppercase text-white drop-shadow-md">${item.navTitle}</h4>
                            <span class="text-brand-orange text-[10px] font-bold tracking-widest mt-1">${item.navSub}</span>
                        </div>
                    </div>
                `;
            });

            return `
                <div class="w-full h-full bg-transparent flex flex-col relative overflow-hidden z-10 text-white">
                    <header class="flex justify-between items-center p-6 md:px-12 md:py-8 z-20">
                        <div class="font-montserrat font-black text-xl tracking-widest cursor-pointer hover:text-brand-orange transition drop-shadow-xl" onclick="setMode('start')">
                            DHARMA<span class="text-brand-orange">.</span>
                        </div>
                        <div class="text-brand-orange text-xs font-bold glass-card px-4 py-2 rounded-full border border-brand-orange/30 hidden md:block shadow-lg">
                            USE W A S D PARA NAVEGAR
                        </div>
                    </header>

                    <main class="flex-1 flex flex-col md:flex-row relative z-10 px-6 md:px-12 pb-[100px]">
                        <div class="flex-1 flex flex-col justify-center md:pr-12 relative z-20">
                            <div id="anim-text" class="slide-enter">
                                <h1 class="font-montserrat font-black text-5xl md:text-6xl lg:text-7xl leading-[0.9] mb-4 tracking-tighter drop-shadow-[0_4px_10px_rgba(0,0,0,0.8)]">
                                    ${slide.title.replace('.', '<span class="text-brand-orange">.</span>')}
                                </h1>
                                <h2 class="text-brand-orange font-bold tracking-[0.2em] uppercase text-xs md:text-sm mb-6 glass-card inline-block px-4 py-1.5 rounded shadow-xl border border-brand-orange/30">
                                    ${slide.subtitle}
                                </h2>
                                <p class="text-gray-100 text-sm md:text-base leading-relaxed max-w-lg mb-8 font-medium drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] glass-card p-5 rounded-2xl">
                                    ${slide.description}
                                </p>
                                <div class="w-full max-w-sm h-px bg-gradient-to-r from-brand-orange to-transparent mb-6"></div>
                                <div class="stats-container glass-card p-4 rounded-xl border border-white/5 inline-block min-w-[300px]">
                                    ${statsHTML}
                                </div>
                            </div>
                        </div>

                        <div class="flex-1 relative hidden md:flex items-center justify-center">
                            <div id="anim-img" class="img-enter float-anim w-full h-[65vh] relative z-10 flex items-center justify-center">
                                ${slide.id === 7 
                                    ? `<div class="w-full max-w-md glass-card p-6 rounded-3xl border border-white/20 shadow-[0_20px_50px_rgba(0,0,0,0.5)]"><canvas id="buddhismChart"></canvas></div>` 
                                    : `<img src="${slide.image}" class="h-full w-auto object-cover object-center image-mask drop-shadow-[0_20px_50px_rgba(0,0,0,0.5)] rounded-2xl border border-white/10">`
                                }
                            </div>
                        </div>
                    </main>

                    <div id="bottom-hover-trigger" onmouseenter="showBottomBar()" onmouseleave="hideBottomBarAfterDelay()"></div>
                    <div id="bottom-nav-bar" class="absolute bottom-6 md:bottom-8 left-0 w-full px-6 md:px-12 z-30 translate-y-[150%]">
                        <div class="flex gap-4 md:gap-6 overflow-x-auto pb-4 custom-scrollbar items-end" onmouseenter="clearBottomBarTimeout()" onmouseleave="hideBottomBarAfterDelay()">
                            ${cardsHTML}
                        </div>
                    </div>
                </div>
            `;
        }

        // ==========================================
        // LÓGICA DE TRANSIÇÃO E VÍDEOS DE FUNDO
        // ==========================================
        function setMode(mode) {
            currentMode = mode;
            if (mode === 'start' || mode === 'os') activeSlideIndex = 0;
            
            const v1 = document.getElementById('video-layer-1');
            const v2 = document.getElementById('video-layer-2');
            const overlay2 = document.getElementById('video-2-overlay');

            // Gestão das Camadas de Vídeo de Fundo
            if (mode === 'start' || mode === 'os') {
                v1.style.opacity = '1';
                v2.style.opacity = '0';
                if(introPlayer && introPlayer.pauseVideo) introPlayer.pauseVideo();
            } else if (mode === 'intro' || mode === 'os-intro') {
                v1.style.opacity = '0';
                v2.style.opacity = '1';
                overlay2.className = "absolute inset-0 bg-black/30 transition-colors duration-1000"; // Mais claro para a intro épica
            } else if (mode === 'normal' || mode === 'os-presentation') {
                v1.style.opacity = '0';
                v2.style.opacity = '1';
                // Escurece um pouco o vídeo 2 (God of War) para os slides ficarem legíveis
                overlay2.className = "absolute inset-0 bg-black/75 transition-colors duration-1000";
            }

            render();
            if (mode === 'os') startClock();
        }

        function playIntro(targetMode) {
            // Pausa música inicial
            if (bgPlayer && bgPlayer.pauseVideo) bgPlayer.pauseVideo();
            
            // Inicia o vídeo épico de fundo
            if (introPlayer && introPlayer.playVideo) {
                introPlayer.seekTo(0);
                introPlayer.unMute();
                introPlayer.setVolume(100);
                introPlayer.playVideo();
            }

            // Altera o layout para a Intro
            setMode(targetMode === 'os-presentation' ? 'os-intro' : 'intro');

            let animationStarted = false;
            const triggerIntroAnimations = () => {
                if (animationStarted) return;
                animationStarted = true;

                const wrapper = document.getElementById('intro-content-wrapper');
                if (wrapper) wrapper.style.opacity = '1';

                const fadeEl = document.querySelector('.studio-fade');
                if (fadeEl) fadeEl.classList.add('fade-anim');

                const letters = document.querySelectorAll('.studio-letter');
                letters.forEach((letter, index) => {
                    setTimeout(() => { letter.classList.add('drop-anim'); }, 800 + (index * 50)); 
                });

                // Fim da Intro -> Vai para os Slides (O vídeo God of War continua no fundo)
                setTimeout(() => {
                    setMode(targetMode);
                }, 5500);
            };

            setTimeout(triggerIntroAnimations, 500);
        }

        // --- Navegação ---
        function changeSlide(index) {
            if (activeSlideIndex === index) return;
            activeSlideIndex = index;
            render();
            showBottomBarTemporarily();
        }

        function triggerSlideAnimations() {
            const textAnim = document.getElementById('anim-text');
            const imgAnim = document.getElementById('anim-img');
            if (textAnim) { textAnim.classList.remove('slide-enter'); void textAnim.offsetWidth; textAnim.classList.add('slide-enter'); }
            if (imgAnim) { imgAnim.classList.remove('img-enter'); void imgAnim.offsetWidth; imgAnim.classList.add('img-enter'); }
        }

        function showBottomBar() { const bar = document.getElementById('bottom-nav-bar'); if (bar) bar.classList.remove('translate-y-[150%]'); }
        function hideBottomBar() { const bar = document.getElementById('bottom-nav-bar'); if (bar) bar.classList.add('translate-y-[150%]'); }
        function clearBottomBarTimeout() { if (bottomBarTimeout) clearTimeout(bottomBarTimeout); }
        function hideBottomBarAfterDelay() { clearBottomBarTimeout(); bottomBarTimeout = setTimeout(hideBottomBar, 2500); }
        function showBottomBarTemporarily() { showBottomBar(); hideBottomBarAfterDelay(); }

        function attachPresentationEvents() {
            document.onkeydown = function(e) {
                if (!currentMode.includes('normal') && !currentMode.includes('os-presentation')) return;
                const key = e.key.toLowerCase();
                if (key === 'arrowright' || key === 'd' || key === 'w' || key === 'arrowup') { changeSlide((activeSlideIndex + 1) % slidesData.length); } 
                else if (key === 'arrowleft' || key === 'a' || key === 's' || key === 'arrowdown') { changeSlide((activeSlideIndex - 1 + slidesData.length) % slidesData.length); }
            };
        }

        // --- MODO OS ---
        let clockInterval;
        function startClock() {
            clearInterval(clockInterval);
            const updateTime = () => { const el = document.getElementById('os-clock'); if(el) el.innerText = new Date().toLocaleTimeString('pt-PT', {hour: '2-digit', minute:'2-digit'}); };
            updateTime(); clockInterval = setInterval(updateTime, 60000);
        }

        function openOSBrowser() { const win = document.getElementById('browser-window'); if (win) win.classList.remove('hidden'); }
        function closeOSBrowser() { const win = document.getElementById('browser-window'); if (win) { win.classList.add('hidden'); setTimeout(() => { if(currentMode === 'os-presentation' || currentMode === 'os-intro') setMode('os'); }, 300); } }

        function startGoogleSearch() {
            const input = document.getElementById('search-input');
            if (!input || input.value !== "") return;
            const textToType = "Apresentação sobre Budismo";
            let i = 0;
            const typeInterval = setInterval(() => {
                input.value += textToType.charAt(i); i++;
                if (i >= textToType.length) {
                    clearInterval(typeInterval);
                    setTimeout(() => { 
                        const urlBar = document.getElementById('url-bar'); 
                        if(urlBar) urlBar.innerText = "dharma.app/apresentacao"; 
                        // Aqui faz o browser ficar fundo preto para a Intro do God of War entrar
                        document.getElementById('browser-content').style.backgroundColor = "black";
                        playIntro('os-presentation'); 
                    }, 600);
                }
            }, 50);
        }

        function initChart() {
            const ctx = document.getElementById('buddhismChart');
            if (!ctx) return;
            if (chartInstance) chartInstance.destroy();
            Chart.defaults.color = '#fff';
            chartInstance = new Chart(ctx, {
                type: 'doughnut', data: { labels: ['Ásia-Pacífico', 'Américas', 'Europa'], datasets: [{ data: [85, 10, 5], backgroundColor: ['#f97316', '#fb923c', '#fdba74'], borderWidth: 0, hoverOffset: 15 }] },
                options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { font: { family: 'Inter', size: 13 } } }, title: { display: true, text: 'Distribuição Demográfica', font: { family: 'Montserrat', size: 16 } } }, cutout: '75%' }
            });
        }
    </script>
</body>
</html>
